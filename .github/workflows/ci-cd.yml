name: CI/CD Pipeline

on:
  push:
    branches: [ main ]          # Run when you push to main branch
  pull_request:
    branches: [ main ]          # Run when someone opens a PR to main

env:
  REGISTRY: localhost:5000      # Address of our local Docker registry
 
jobs:
 
  lint:
    name: Lint Code and Dockerfiles
    runs-on: ubuntu-latest      # Use GitHub's free Ubuntu machine
 
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      # STEP 3: Install flake8 — the Python code style checker.
      - name: Install Python linter
        run: pip install flake8
 
      
      - name: Lint Python API
        continue-on-error: true
        run: flake8 api/main.py 
               --max-line-length=120 
               --ignore=E501,W503,F401
 
      # STEP 5: Run flake8 on your worker code.
      - name: Lint Python Worker
        continue-on-error: true
        run: |
          flake8 worker/worker.py 
            --max-line-length=120 
            --ignore=E501,W503,F401
 
      # STEP 6: Install Node.js so we can run ESLint.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
 
      
      - name: Install frontend dependencies
        run: cd frontend && npm install
 
      
      - name: Lint JavaScript
        continue-on-error: true
        run: |
          cd frontend
          npx eslint app.js \
            --no-eslintrc \
            --env node \
            --env es2021 \
            --rule 'no-unused-vars: warn' \
            --rule 'no-undef: error' \
            --max-warnings=0
 
      
      - name: Lint Dockerfiles with hadolint
        continue-on-error: true
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile
 
  
  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs: lint                 # Only runs if lint passed
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      
      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov httpx
 
      
      - name: Run tests with coverage
        run: |
          pytest api/test_api.py -v \
            --cov=api \
            --cov-report=xml \
            --cov-report=html
 
      
      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7     # Keep the artifact for 7 days
 
  
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test                 # Only runs if tests passed
 
    
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000           # Expose registry on localhost:5000
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          
          driver-opts: network=host
 
      
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:${{ github.sha }}
            ${{ env.REGISTRY }}/api:latest
 
      # STEP: Build and push the worker image.
      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/worker:latest
 
      # STEP: Build and push the frontend image.
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/frontend:latest
 
      
      - name: Save images as tar files
        run: |
          docker pull ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/worker:${{ github.sha }}
          docker pull ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker save ${{ env.REGISTRY }}/api:${{ github.sha }} | gzip > /tmp/api.tar.gz
          docker save ${{ env.REGISTRY }}/worker:${{ github.sha }} | gzip > /tmp/worker.tar.gz
          docker save ${{ env.REGISTRY }}/frontend:${{ github.sha }} | gzip > /tmp/frontend.tar.gz
 
      # STEP: Upload the tar files as pipeline artifacts.
      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: /tmp/*.tar.gz
          retention-days: 1     # Only need these for the next few jobs
 
  
  security-scan:
    name: Security Scan with Trivy
    runs-on: ubuntu-latest
    needs: build                # Only runs if build passed
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      # STEP: Download the image tar files from the build job.
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp
 
      # STEP: Load the images from tar files into Docker.
      # "docker load" is the opposite of "docker save".
      - name: Load images into Docker
        run: |
          docker load -i /tmp/api.tar.gz
          docker load -i /tmp/worker.tar.gz
          docker load -i /tmp/frontend.tar.gz
 
      
      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/api:${{ github.sha }}
          format: sarif
          output: api-trivy.sarif
          severity: CRITICAL,HIGH  # Only report HIGH and CRITICAL
 
      - name: Scan Worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/worker:${{ github.sha }}
          format: sarif
          output: worker-trivy.sarif
          severity: CRITICAL,HIGH
 
      - name: Scan Frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL,HIGH
 
      
      - name: Upload SARIF results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: '.'       # Upload all .sarif files in the directory
 
      
      - name: Fail pipeline on CRITICAL vulnerabilities
        run: |
          docker run --rm aquasec/trivy:latest image \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            ${{ env.REGISTRY }}/api:${{ github.sha }}
 
          docker run --rm aquasec/trivy:latest image \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            ${{ env.REGISTRY }}/worker:${{ github.sha }}
 
          docker run --rm aquasec/trivy:latest image \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
 
  
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: security-scan        # Only runs if security scan passed
 
    
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      # STEP: Download image tar files from the build job artifact.
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp
 
      
      - name: Load and push images to local registry
        run: |
          docker load -i /tmp/api.tar.gz
          docker load -i /tmp/worker.tar.gz
          docker load -i /tmp/frontend.tar.gz
          docker push ${{ env.REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}
 
      
      - name: Create compose override for pre-built images
        run: |
          cat > docker-compose.override.yml << EOF
          services:
            api:
              image: ${{ env.REGISTRY }}/api:${{ github.sha }}
              build: !reset null
            worker:
              image: ${{ env.REGISTRY }}/worker:${{ github.sha }}
              build: !reset null
            frontend:
              image: ${{ env.REGISTRY }}/frontend:${{ github.sha }}
              build: !reset null
          EOF
 
     
      - name: Start the full stack
        run: docker compose up -d
 
      
      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for stack to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Stack is healthy after $((i * 3)) seconds"
              exit 0
            fi
            echo "Attempt $i/60 — not ready yet, waiting 3s..."
            sleep 3
          done
          echo "Stack never became healthy. Printing logs:"
          docker compose logs
          exit 1
 
      
      - name: Submit a test job
        run: |
          echo "Submitting job..."
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          if [ -z "$JOB_ID" ] || [ "$JOB_ID" = "null" ]; then
            echo "Failed to get job_id from response"
            exit 1
          fi
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV
          echo "Job submitted with ID: $JOB_ID"
 
      
      - name: Poll until job is completed
        run: |
          echo "Polling job ${{ env.JOB_ID }} for completion..."
          for i in $(seq 1 60); do
            STATUS=$(curl -sf http://localhost:3000/status/${{ env.JOB_ID }} | jq -r '.status')
            echo "Attempt $i — Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete within 2 minutes"
          docker compose logs worker
          exit 1
 
     
      - name: Assert final job status is completed
        run: |
          FINAL=$(curl -sf http://localhost:3000/status/${{ env.JOB_ID }} | jq -r '.status')
          echo "Final job status: $FINAL"
          if [ "$FINAL" != "completed" ]; then
            echo "FAIL: Expected 'completed' but got '$FINAL'"
            exit 1
          fi
          echo "PASS: Job status is 'completed'"
 
      
      
      - name: Tear down stack
        if: always()
        run: docker compose down -v
 
  
  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: integration-test     # Only runs if integration tests passed
 
   
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      # STEP: Download the pre-built images.
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp
 
      # STEP: Load the images into Docker.
      - name: Load images
        run: |
          docker load -i /tmp/api.tar.gz
          docker load -i /tmp/worker.tar.gz
          docker load -i /tmp/frontend.tar.gz
 
      
      - name: Perform rolling update
        run: |
          echo "Starting rolling update..."
 
          # Scale up — starts a second instance of each service
          # alongside the currently running ones
          docker compose up -d --no-deps --scale api=2 api
          docker compose up -d --no-deps --scale worker=2 worker
          docker compose up -d --no-deps --scale frontend=2 frontend
 
          # Wait up to 60 seconds for new containers to become healthy
          for SERVICE in api worker frontend; do
            echo "Waiting for new $SERVICE container to become healthy..."
            HEALTHY=false
            for i in $(seq 1 60); do
              # Count how many containers for this service are healthy
              HEALTHY_COUNT=$(docker compose ps $SERVICE | grep "healthy" | wc -l)
              if [ "$HEALTHY_COUNT" -ge 2 ]; then
                echo "New $SERVICE container is healthy"
                HEALTHY=true
                break
              fi
              sleep 1
            done
 
            # If new container never became healthy, abort and rollback
            if [ "$HEALTHY" = "false" ]; then
              echo "FAIL: New $SERVICE container did not pass health check within 60s"
              echo "Aborting — old container left running"
              # Scale back down to 1 — removes the new unhealthy container
              docker compose up -d --no-deps --scale $SERVICE=1 $SERVICE
              exit 1
            fi
 
            # New container is healthy — scale back to 1
            # Docker Compose removes the OLD container when scaling down
            docker compose up -d --no-deps --scale $SERVICE=1 $SERVICE
            echo "$SERVICE rolling update complete"
          done
 
          echo "All services deployed successfully"
 
      # STEP: Report the final deployment status.
      # "if: always()" means this runs whether deploy succeeded or failed.
      - name: Report deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment SUCCEEDED — all services healthy"
          else
            echo "Deployment FAILED — old containers left running"
          fi
 